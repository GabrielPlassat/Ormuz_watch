name: Update Tripwires

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:       # déclenchement manuel

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser anthropic yfinance pandas --quiet

      - name: Create data/ directory
        run: mkdir -p data

      - name: Run update_tripwires
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_tripwires.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auto_scores.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "auto: tripwires $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          )
